name: Deploy Stock Risk Worker

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy-stock-risk-worker.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check required secrets
        id: secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          if [ -n "$CLOUDFLARE_API_TOKEN" ] && [ -n "$CLOUDFLARE_ACCOUNT_ID" ] && [ -n "$FRED_API_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Stock risk Worker deploy skipped because one or more required secrets are missing."
          fi

      - name: Check out repository
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Deploy Worker shell
        if: steps.secrets.outputs.ready == 'true'
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest deploy

      - name: Set FRED secret
        if: steps.secrets.outputs.ready == 'true'
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          printf '%s' "$FRED_API_KEY" | npx --yes wrangler@latest secret put FRED_API_KEY

      - name: Deploy Worker with secret
        if: steps.secrets.outputs.ready == 'true'
        working-directory: backend
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@latest deploy
