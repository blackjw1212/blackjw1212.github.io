name: Site check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Run backend and frontend smoke tests
        working-directory: backend
        run: npm test

      - name: Check static site contract
        run: node scripts/check-static-site.mjs
