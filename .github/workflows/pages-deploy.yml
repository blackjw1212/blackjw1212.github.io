name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Build static site artifact
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist
          cp -R index.html bjkw_weather.html 404.html stocks weather data assets dist/
          touch dist/.nojekyll

      - name: Check static site
        run: node scripts/check-static-site.mjs dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
