<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人即時氣象與潮汐</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── 全域變數與設計系統 ────────────────────────────────── */
:root {
  --bg: #F1F5F9; --bg-card: #FFFFFF; --bg-raised: #F8FAFC; --bg-subtle: #F1F5F9;
  --border: rgba(0,0,0,.08); --border-strong: rgba(0,0,0,.14);
  --txt: #0F172A; --txt-2: #475569; --txt-3: #94A3B8;
  --accent: #2563EB; --accent-dim: rgba(37,99,235,.12);
  --ok-bg: #ECFDF5; --ok-border: #10B981; --ok-txt: #064E3B;
  --warn-bg: #FFFBEB; --warn-border: #F59E0B; --warn-txt: #78350F;
  --err-bg: #FEF2F2; --err-border: #EF4444; --err-txt: #7F1D1D;
  --radius-lg: 14px; --radius-xl: 20px;
  --shadow: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0F172A; --bg-card: #1E293B; --bg-raised: #334155; --bg-subtle: #0F172A;
    --border: rgba(255,255,255,.1); --border-strong: rgba(255,255,255,.2);
    --txt: #F1F5F9; --txt-2: #CBD5E1; --txt-3: #64748B;
    --accent: #38BDF8; --accent-dim: rgba(56,189,248,.15);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--txt); font-size: 16px; line-height: 1.6; transition: background 0.3s; }
.page { max-width: 900px; margin: 0 auto; padding: 24px 16px 80px; }

/* ─── UI 組件 ─────────────────────────────────────────── */
.topbar { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; }
.title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
.meta { font-size: 14px; color: var(--txt-3); font-family: 'DM Mono'; margin-top: 4px; }
.section-lbl { font-size: 14px; font-weight: 700; color: var(--txt-3); margin: 30px 0 12px; letter-spacing: 1.5px; text-transform: uppercase; border-left: 4px solid var(--accent); padding-left: 10px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-xl); padding: 20px; box-shadow: var(--shadow); margin-bottom: 16px; overflow: hidden; }

/* ─── 當前重點顯示 (App Style) ─────────────────────────── */
.current-focus { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px dashed var(--border-strong); margin-bottom: 20px; }
.focus-temp { font-size: 56px; font-weight: 700; font-family: 'DM Mono'; letter-spacing: -3px; }
.focus-desc { text-align: right; }
.focus-wx { font-size: 42px; margin-bottom: 4px; line-height: 1; }
.focus-label { font-size: 15px; color: var(--txt-3); font-weight: 500; }

.metric-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
.metric-pill { background: var(--bg-subtle); border-radius: var(--radius-lg); padding: 14px 10px; text-align: center; border: 1px solid var(--border); }
.m-lbl { font-size: 12px; color: var(--txt-3); margin-bottom: 4px; font-weight: 600; }
.m-val { font-size: 18px; font-weight: 700; font-family: 'DM Mono'; }

/* ─── 24H 橫向捲動預報 ───────────────────────────────── */
.fcst-scroll { display: flex; overflow-x: auto; gap: 14px; padding: 5px 2px 15px 2px; scrollbar-width: none; }
.fcst-scroll::-webkit-scrollbar { display: none; }
.fcst-item { flex: 0 0 100px; background: var(--bg-raised); border-radius: var(--radius-lg); padding: 20px 10px; text-align: center; border: 1px solid var(--border); transition: 0.2s; }
.fcst-item:hover { border-color: var(--accent); transform: translateY(-3px); }
.f-time { font-size: 13px; color: var(--txt-3); font-family: 'DM Mono'; font-weight: 500; }
.f-icon { font-size: 30px; margin: 12px 0; }
.f-temp { font-size: 21px; font-weight: 700; font-family: 'DM Mono'; }
.f-pop { font-size: 12px; color: var(--accent); font-weight: 700; margin-top: 4px; }

/* ─── 判定與出海建議 ─────────────────────────────────── */
.verdict { display: flex; align-items: center; gap: 20px; padding: 24px; border-radius: var(--radius-xl); border: 2px solid; margin-bottom: 20px; box-shadow: var(--shadow); }
.verdict.ok { background: var(--ok-bg); border-color: var(--ok-border); color: var(--ok-txt); }
.verdict.caution { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn-txt); }
.verdict.danger { background: var(--err-bg); border-color: var(--err-border); color: var(--err-txt); }
.verdict-icon { font-size: 32px; width: 52px; height: 52px; background: rgba(255,255,255,0.3); border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* ─── 潮汐預報表格 ───────────────────────────────────── */
.tide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-top: 10px; }
.tide-cell { background: var(--bg-subtle); border-radius: var(--radius-lg); padding: 16px; border: 1px solid var(--border); position: relative; }
.t-type { font-size: 13px; font-weight: 700; opacity: 0.8; margin-bottom: 4px; }
.t-ht { font-size: 24px; font-weight: 700; font-family: 'DM Mono'; margin: 4px 0; }
.t-tm { font-size: 15px; font-family: 'DM Mono'; font-weight: 500; }

.row { display: flex; align-items: center; padding: 14px 0; border-bottom: 1px solid var(--border); gap: 12px; }
.row:last-child { border-bottom: none; }
.row-name { font-weight: 700; width: 75px; font-size: 16px; }
.row-detail { flex: 1; font-size: 14px; color: var(--txt-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: 'DM Mono'; }

.badge { font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 20px; white-space: nowrap; }
.b-ok { background: #DCFCE7; color: #166534; }
.b-caution { background: #FEF3C7; color: #92400E; }
.b-danger { background: #FEE2E2; color: #991B1B; }

.day-hdr { font-size: 16px; font-weight: 700; margin-top: 24px; display: flex; align-items: center; gap: 10px; }
.day-pill { font-size: 12px; background: var(--accent-dim); color: var(--accent); padding: 3px 12px; border-radius: 12px; font-weight: 700; }

@media (min-width: 768px) { .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 0 28px; } .full { grid-column: 1 / -1; } }
#refresh { padding: 10px 24px; border-radius: 12px; border: 1px solid var(--border-strong); background: var(--bg-card); cursor: pointer; font-weight: 700; color: var(--txt-2); transition: 0.2s; box-shadow: var(--shadow-sm); }
#refresh:hover { background: var(--bg-subtle); color: var(--accent); }
</style>
</head>
<body>

<div class="page">
  <div class="topbar">
    <div>
      <div class="title">個人即時氣象與潮汐</div>
      <div id="meta" class="meta">載入中...</div>
    </div>
    <button id="refresh" onclick="loadAll()">手動重整</button>
  </div>

  <div id="content">
    <div class="card" style="text-align: center; padding: 60px;">
      <div style="font-size: 24px; margin-bottom: 10px;">⏳</div>
      <div>正在連線中央氣象署 (CWA) 獲取最新資料...</div>
    </div>
  </div>
</div>

<script>
/* ─── 核心資料與對照表 ────────────────────────────────── */
const API_KEY = "CWA-FA47367B-3420-4F98-A4D5-ADD81BE0B26E";
const BASE = "https://opendata.cwa.gov.tw/api/v1/rest/datastore";
const OBS_STATIONS = { C0M710: "東石", CAL090: "西濱北", CAL100: "西濱南" };
const LUNAR_MONTH = ["","正","二","三","四","五","六","七","八","九","十","冬","臘"];
const LUNAR_DAY = ["","初一","初二","初三","初四","初五","初六","初七","初八","初九","初十","十一","十二","十三","十四","十五","十六","十七","十八","十九","二十","廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];

/* ─── 工具函式 ────────────────────────────────────────── */
async function apiFetch(ep, params) {
  const p = new URLSearchParams({...params, Authorization: API_KEY, format: "JSON"});
  const r = await fetch(`${BASE}/${ep}?${p}`);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

function wxIcon(w) {
  if (!w) return "🌤";
  if (w.includes("雷")) return "⛈";
  if (w.includes("雨")) return "🌧";
  if (w.includes("陰")) return "☁";
  if (w.includes("多雲")) return "⛅";
  if (w.includes("晴")) return "☀️";
  return "🌤";
}

function bft(ms) {
  const v = parseFloat(ms); if (isNaN(v) || v < 0) return 0;
  if (v < 0.3) return 0; if (v < 1.6) return 1; if (v < 3.4) return 2; if (v < 5.5) return 3;
  if (v < 8.0) return 4; if (v < 10.8) return 5; if (v < 13.9) return 6; if (v < 17.2) return 7; return 8;
}
const bftLabel = (b) => ["無風","軟風","輕風","微風","和風","清風","強風","疾風","大風"][b] || "強風";

function parseForecast(data, target) {
  const res = {}; if (!data) return res;
  try {
    const loc = data.records.Locations[0].Location.find(l => l.LocationName.includes(target));
    if (loc) {
      loc.WeatherElement.forEach(e => {
        res[e.ElementName] = {};
        e.Time.forEach(t => {
          const dtk = t.DataTime || t.StartTime || "";
          const key = dtk.slice(0, 13).replace("T", "_");
          res[e.ElementName][key] = t.ElementValue[0];
        });
      });
    }
  } catch (e) { console.error("Parse Error:", e); }
  return res;
}

function nearest(data, field, dt) {
  const d = data[field] || {};
  const target = dt.toISOString().slice(0, 13).replace("T", "_");
  const keys = Object.keys(d).sort();
  if (!keys.length) return null;
  const match = keys.find(k => k >= target) || keys[keys.length - 1];
  return d[match];
}

/* ─── 主程式邏輯 ──────────────────────────────────────── */
async function loadAll() {
  const content = document.getElementById("content");
  const meta = document.getElementById("meta");
  const btn = document.getElementById("refresh");
  btn.disabled = true;
  btn.innerHTML = "更新中...";

  try {
    const n = new Date();
    const todayISO = n.toISOString().slice(0, 10);

    const [obsRes, cityRes, seaRes, tideRes] = await Promise.allSettled([
      apiFetch("O-A0001-001", {}), // 即時觀測
      apiFetch("F-D0047-057", { LocationName: "東區" }), // 市區預報
      apiFetch("F-D0047-029", { LocationName: "東石鄉" }), // 海面預報
      apiFetch("F-A0021-001", { LocationName: "嘉義縣東石鄉" }) // 潮汐預報
    ]);

    const cityData = cityRes.status === "fulfilled" ? parseForecast(cityRes.value, "東區") : {};
    const seaData = seaRes.status === "fulfilled" ? parseForecast(seaRes.value, "東石") : {};

    // 1. 24H 預報與大字型重點
    let fcstCards = "", temps = [], focusTemp = "--", focusWx = "🌤", focusPop = "0";
    for (let i = 0; i <= 24; i += 3) {
      const t = new Date(n.getTime() + i * 3600000);
      const tmp = nearest(cityData, "溫度", t);
      const pop = nearest(cityData, "3小時降雨機率", t);
      const wx = nearest(cityData, "天氣現象", t);
      const tVal = tmp?.Temperature || "--";
      const wStr = wx?.Weather || "晴";
      if (tVal !== "--") temps.push(parseInt(tVal));
      if (i === 0) { 
        focusTemp = tVal; 
        focusWx = wxIcon(wStr); 
        focusPop = pop?.ProbabilityOfPrecipitation || "0"; 
      }
      fcstCards += `
        <div class="fcst-item">
          <div class="f-time">${i === 0 ? '現在' : t.getHours() + ':00'}</div>
          <div class="f-icon">${wxIcon(wStr)}</div>
          <div class="f-temp">${tVal}°</div>
          <div class="f-pop">💧${pop?.ProbabilityOfPrecipitation || 0}%</div>
        </div>`;
    }
    const tRng = temps.length ? `${Math.min(...temps)}~${Math.max(...temps)}°C` : "--°C";

    // 2. 即時觀測 (東石測站)
    let obsRows = "", maxObsBft = 0;
    if (obsRes.status === "fulfilled") {
      obsRes.value.records.Station.filter(s => OBS_STATIONS[s.StationId]).forEach(s => {
        const speed = s.WeatherElement.WindSpeed;
        const b = bft(speed);
        if (b > maxObsBft) maxObsBft = b;
        obsRows += `<div class="row">
          <span class="row-name">${OBS_STATIONS[s.StationId]}</span>
          <span class="row-detail">${wxIcon(s.WeatherElement.Weather)} ${s.WeatherElement.AirTemperature}°C · ${speed}m/s</span>
          <span class="badge ${b <= 3 ? 'b-ok' : b <= 4 ? 'b-caution' : 'b-danger'}">${b}級 ${bftLabel(b)}</span>
        </div>`;
      });
    }

    // 3. 未來海風預報 (6H)
    let seaRows = "", maxFcstBft = 0;
    for (let i = 0; i <= 6; i++) {
      const t = new Date(n.getTime() + i * 3600000);
      const spd = nearest(seaData, "風速", t);
      const b = spd?.BeaufortScale ? parseInt(spd.BeaufortScale) : 0;
      if (b > maxFcstBft) maxFcstBft = b;
      seaRows += `<div class="row">
        <span class="row-name" style="font-family:'DM Mono'">${t.getHours()}:00</span>
        <span class="row-detail">${nearest(seaData, "風向", t)?.WindDirection || '--'}風 · ${spd?.WindSpeed || '--'}m/s</span>
        <span class="badge ${b <= 3 ? 'b-ok' : b <= 4 ? 'b-caution' : 'b-danger'}">${b}級</span>
      </div>`;
    }

    // 4. 潮汐與趕潮窗口 (±2小時星級判定)
    let tideHtml = "", dryTides = [];
    if (tideRes.status === "fulfilled") {
      const daily = tideRes.value.records.TideForecasts[0].Location.TimePeriods.Daily;
      daily.slice(0, 3).forEach(day => {
        const ld = day.LunarDate?.split("-") || [];
        const lStr = ld.length ? `農曆${LUNAR_MONTH[+ld[1]]}${LUNAR_DAY[+ld[2]]}` : "";
        tideHtml += `<div class="day-hdr">${day.Date.slice(5)} <span class="day-pill">${lStr}</span> <span class="day-pill">${day.TideRange}潮</span></div><div class="tide-grid">`;
        day.Time.forEach(t => {
          const isHi = t.Tide === "滿潮";
          const h = t.TideHeights.AboveTWVD;
          if (!isHi && day.Date === todayISO) dryTides.push({ t: new Date(t.DateTime), h: parseInt(h) });
          tideHtml += `<div class="tide-cell"><div class="t-type">${isHi ? '▲ 滿潮' : '▽ 乾潮'}</div><div class="t-ht" style="color:${isHi ? 'var(--accent)' : 'var(--txt-2)'}">${h}cm</div><div class="t-tm">${t.DateTime.slice(11, 16)}</div></div>`;
        });
        tideHtml += `</div>`;
      });
    }

    // 5. 判斷出海總體建議
    const totalMax = Math.max(maxObsBft, maxFcstBft);
    const vCls = totalMax <= 3 ? "ok" : totalMax <= 4 ? "caution" : "danger";
    const vMain = totalMax <= 3 ? "適合出海：風平浪靜" : totalMax <= 4 ? "注意安全：風力轉強" : "不宜出海：風浪危險";

    // 渲染最終頁面
    content.innerHTML = `
      <div class="verdict ${vCls}">
        <div class="verdict-icon">${totalMax <= 3 ? '✓' : (totalMax <= 4 ? '!' : '✕')}</div>
        <div>
          <div style="font-weight:700; font-size:20px">${vMain}</div>
          <div style="font-size:14px; opacity:0.85">最大觀測：${maxObsBft} 級 / 預報最大：${maxFcstBft} 級</div>
        </div>
      </div>

      <div class="two-col">
        <div class="col-left">
          <div class="section-lbl">嘉義市東區 天氣概況</div>
          <div class="card">
            <div class="current-focus">
              <div class="focus-temp">${focusTemp}°</div>
              <div class="focus-desc"><div class="focus-wx">${focusWx}</div><div class="focus-label">降雨機率 ${focusPop}%</div></div>
            </div>
            <div class="metric-grid">
              <div class="metric-pill"><div class="m-lbl">今日氣溫</div><div class="m-val">${tRng}</div></div>
              <div class="metric-pill"><div class="m-lbl">相對濕度</div><div class="m-val">${nearest(cityData, "相對濕度", n)?.RelativeHumidity || '--'}%</div></div>
              <div class="metric-pill"><div class="m-lbl">紫外線</div><div class="m-val">${nearest(cityData, "紫外線指數", n)?.UVIndex || '--'}</div></div>
            </div>
            <div class="fcst-scroll">${fcstCards}</div>
          </div>
          
          <div class="section-lbl">東石潮汐預報 (3日)</div>
          <div class="card">${tideHtml}</div>
        </div>

        <div class="col-right">
          <div class="section-lbl">沿海實時風力 (東石)</div>
          <div class="card">${obsRows || '<div class="meta">暫無測站資料</div>'}</div>

          <div class="section-lbl">東石海風預報 (6H)</div>
          <div class="card">${seaRows}</div>

          <div class="section-lbl">今日趕潮窗口 (±2H)</div>
          <div class="card">
            ${dryTides.map(d => {
              const s = new Date(d.t.getTime() - 7200000), e = new Date(d.t.getTime() + 7200000);
              const stars = d.h < -40 ? "★★★" : (d.h < 0 ? "★★" : "★");
              const starColor = d.h < -40 ? "#10B981" : (d.h < 0 ? "#F59E0B" : "#94A3B8");
              return `<div class="row">
                <span class="row-name">${s.getHours()}:00-${e.getHours()}:00</span>
                <span class="row-detail">低潮 ${d.t.getHours()}:${d.t.getMinutes().toString().padStart(2,'0')} (${d.h}cm)</span>
                <span style="color:${starColor}; font-weight:bold">${stars}</span>
              </div>`;
            }).join("") || '<div class="meta">今日已無剩餘趕潮窗口</div>'}
          </div>
          
          <div class="section-lbl">常用連結</div>
          <div class="card" style="padding:15px">
            <a href="https://www.cwa.gov.tw/V8/C/M/TownCoastal/TownCoastal.html?cID=10010&pointID=1001009C01" target="_blank" style="color:var(--accent); text-decoration:none; font-weight:700; font-size:15px;">東石鄉沿海詳細預報 →</a>
          </div>
        </div>
      </div>
    `;

    meta.textContent = `最後更新於 ${n.toLocaleTimeString()} (2026/04/07)`;
  } catch (e) {
    content.innerHTML = `<div class="card" style="color:var(--err-txt); background:var(--err-bg); border-color:var(--err-border);">
      <strong>資料載入發生錯誤</strong><br>
      原因：${e.message}<br><br>
      <small>提示：請檢查 API Key 是否有效，或是否遭受 CORS 限制。</small>
    </div>`;
  }
  btn.disabled = false;
  btn.innerHTML = "手動重整";
}

// 首次執行
loadAll();
</script>
</body>
</html>
