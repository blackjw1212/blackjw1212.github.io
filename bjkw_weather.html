<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJKW即時氣象報告</title>
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ─── Design values ─────────────────────────────────────── */
:root {
  --bg:            #F4F6F8;
  --bg-card:       #FFFFFF;
  --bg-raised:     #EDF0F3;
  --bg-subtle:     #E7ECF1;
  --border:        rgba(0,0,0,.09);
  --border-strong: rgba(0,0,0,.15);
  --txt:           #0F1923;
  --txt-2:         #435360;
  --txt-3:         #7A909F;
  --accent:        #1A73C8;
  --accent-dim:    rgba(26,115,200,.12);
  --link:          #1A73C8;

  --ok-bg:         #E8F5DB;
  --ok-border:     #7DB94A;
  --ok-txt:        #1A4006;
  --ok-badge-bg:   #D4EEC0;
  --ok-badge-txt:  #2A6010;

  --warn-bg:       #FEF3DC;
  --warn-border:   #E9A130;
  --warn-txt:      #5C3507;
  --warn-badge-bg: #FAEAC5;
  --warn-badge-txt:#7C4A0A;

  --err-bg:        #FDEAEA;
  --err-border:    #E87575;
  --err-txt:       #4A1010;
  --err-badge-bg:  #FACECE;
  --err-badge-txt: #8B1E1E;

  --tide-hi:       #1A5FA8;
  --tide-lo:       #B85C00;

  --radius-sm:     6px;
  --radius-md:     10px;
  --radius-lg:     14px;
  --radius-xl:     18px;

  --shadow-sm:     0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:     0 3px 10px rgba(0,0,0,.08), 0 1px 3px rgba(0,0,0,.06);
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:            #0D1620;
    --bg-card:       #162030;
    --bg-raised:     #1C2A3E;
    --bg-subtle:     #1A2535;
    --border:        rgba(255,255,255,.08);
    --border-strong: rgba(255,255,255,.14);
    --txt:           #E8EFF5;
    --txt-2:         #8FAFC4;
    --txt-3:         #5A7A8F;
    --accent:        #4B9FE1;
    --accent-dim:    rgba(75,159,225,.14);
    --link:          #5AADE8;

    --ok-bg:         #152B0A;
    --ok-border:     #4A8525;
    --ok-txt:        #A8E07A;
    --ok-badge-bg:   #1C3E0E;
    --ok-badge-txt:  #90D060;

    --warn-bg:       #2A1A04;
    --warn-border:   #C4820A;
    --warn-txt:      #F5C87A;
    --warn-badge-bg: #3A2308;
    --warn-badge-txt:#EDB860;

    --err-bg:        #2A0A0A;
    --err-border:    #C44040;
    --err-txt:       #F5A0A0;
    --err-badge-bg:  #3A1010;
    --err-badge-txt: #E88080;

    --tide-hi:       #5AADE8;
    --tide-lo:       #E8A040;

    --shadow-sm:     0 1px 3px rgba(0,0,0,.3);
    --shadow-md:     0 3px 12px rgba(0,0,0,.35);
  }
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Noto Sans TC', system-ui, sans-serif;
  background: var(--bg);
  color: var(--txt);
  font-size: 16px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

.page {
  max-width: 820px;
  margin: 0 auto;
  padding: 20px 20px 48px;
}

/* ─── Top bar ────────────────────────────────────────────── */
.topbar {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.title { font-size: 20px; font-weight: 600; letter-spacing: -.01em; color: var(--txt); }
.meta  { font-size: 13px; color: var(--txt-3); margin-top: 4px; font-family: 'DM Mono', monospace; }
#refresh {
  font-family: 'Noto Sans TC', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 8px 16px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius-md);
  background: var(--bg-card);
  color: var(--txt-2);
  cursor: pointer;
  transition: background .15s, color .15s, opacity .15s;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
}
#refresh:hover   { background: var(--bg-raised); color: var(--txt); }
#refresh:disabled{ opacity: .4; cursor: default; }

/* ─── 暫存警告橫幅 ─────────────────────────────────────── */
.cache-banner {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 16px;
  background: var(--warn-bg);
  border: 1px solid var(--warn-border);
  border-radius: var(--radius-lg);
  color: var(--warn-txt);
  font-size: 13px;
  margin-bottom: 14px;
}
.cache-banner .cb-icon { font-size: 16px; flex-shrink: 0; }

/* ─── Spinner ────────────────────────────────────────────── */
.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--border-strong);
  border-top-color: var(--txt-2);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── Section label ──────────────────────────────────────── */
.section-lbl {
  font-size: 13px; font-weight: 600;
  letter-spacing: .07em; text-transform: uppercase;
  color: var(--txt-3); margin: 20px 0 10px;
}

/* ─── Card ───────────────────────────────────────────────── */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 18px 20px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}

/* ─── Verdict banner ─────────────────────────────────────── */
.verdict {
  display: flex; align-items: flex-start; gap: 14px;
  padding: 18px 20px;
  border-radius: var(--radius-xl); border: 1px solid;
  margin-bottom: 14px; box-shadow: var(--shadow-sm);
}
.verdict.ok      { background: var(--ok-bg);   border-color: var(--ok-border);   color: var(--ok-txt);   }
.verdict.caution { background: var(--warn-bg); border-color: var(--warn-border); color: var(--warn-txt); }
.verdict.danger  { background: var(--err-bg);  border-color: var(--err-border);  color: var(--err-txt);  }
.verdict.unknown { background: var(--bg-raised); border-color: var(--border);    color: var(--txt-2);    }
.verdict-icon {
  font-size: 22px; line-height: 1.2; flex-shrink: 0;
  width: 34px; height: 34px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; background: rgba(255,255,255,.18); font-weight: 700;
}
.verdict-main { font-size: 16px; font-weight: 600; }
.verdict-sub  { font-size: 13px; margin-top: 4px; opacity: .82; font-family: 'DM Mono', monospace; }
.verdict-note {
  font-size: 12px;
  line-height: 1.45;
  margin-top: 6px;
  opacity: .76;
}

/* ─── Quick summary ──────────────────────────────────────── */
.quick-summary {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: var(--radius-xl);
  padding: 16px 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}
.quick-kicker {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .06em;
  color: var(--txt-3);
}
.quick-title {
  font-size: 17px;
  font-weight: 700;
  color: var(--txt);
  margin-top: 2px;
}
.decision-list {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  margin-top: 12px;
}
.decision-line {
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-left: 4px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 10px 11px;
  min-width: 0;
}
.decision-line.ok      { border-left-color: var(--ok-border); }
.decision-line.caution { border-left-color: var(--warn-border); }
.decision-line.danger  { border-left-color: var(--err-border); }
.decision-line.unknown { border-left-color: var(--txt-3); }
.decision-label {
  font-size: 12px;
  color: var(--txt-3);
  margin-bottom: 4px;
}
.decision-main {
  font-size: 22px;
  font-weight: 700;
  color: var(--txt);
  line-height: 1.1;
}
.decision-line.ok .decision-main { color: var(--ok-txt); }
.decision-line.caution .decision-main { color: var(--warn-txt); }
.decision-line.danger .decision-main { color: var(--err-txt); }
.quick-metrics {
  display: grid;
  grid-template-columns: 1.25fr .85fr .8fr;
  gap: 8px;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.quick-metric {
  min-width: 0;
}
.quick-metric span {
  display: block;
  font-size: 11px;
  color: var(--txt-3);
  margin-bottom: 2px;
}
.quick-metric strong {
  display: block;
  font-size: 13px;
  color: var(--txt);
  font-family: 'DM Mono', monospace;
  white-space: nowrap;
}
.quick-note {
  font-size: 12px;
  color: var(--txt-3);
  line-height: 1.45;
  margin-top: 10px;
}

/* ─── Current Focus ──────────────────────────────────────── */
.current-focus {
  display: flex; align-items: center; gap: 18px; padding: 8px 0 20px;
}
.cf-icon { font-size: 54px; line-height: 1; }
.cf-data { display: flex; flex-direction: column; }
.cf-temp { font-size: 38px; font-weight: 600; font-family: 'DM Mono', monospace; line-height: 1.1; }
.cf-desc { font-size: 16px; color: var(--txt-2); font-weight: 500; margin-top: 2px; }
.cf-sub  { display: flex; gap: 14px; font-size: 13px; color: var(--txt-3); margin-top: 6px; }

/* ─── Metric grid ────────────────────────────────────────── */
.g2 {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px; margin-bottom: 16px;
}
.metric {
  background: var(--bg-subtle);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.metric-lbl { font-size: 13px; color: var(--txt-3); margin-bottom: 4px; }
.metric-val { font-size: 20px; font-weight: 600; font-family: 'DM Mono', monospace; }

/* ─── 日光條 ─────────────────────────────────────────────── */
.daylight-wrap {
  margin-bottom: 16px;
  background: var(--bg-subtle);
  border-radius: var(--radius-md);
  padding: 12px 14px;
  border: 1px solid var(--border);
}
.daylight-lbl { font-size: 13px; color: var(--txt-3); margin-bottom: 8px; }
.daylight-row {
  display: flex; align-items: center; gap: 8px;
}
.dl-time {
  font-size: 13px; font-family: 'DM Mono', monospace;
  color: var(--txt-2); white-space: nowrap; flex-shrink: 0;
}
.dl-track {
  flex: 1; height: 8px;
  background: var(--bg-card);
  border-radius: 999px;
  border: 1px solid var(--border-strong);
  position: relative; overflow: hidden;
}
.dl-fill {
  height: 100%;
  background: linear-gradient(90deg, #F5A623 0%, #FFD166 60%, #F5A623 100%);
  border-radius: 999px;
  transition: width .4s ease;
}
.dl-night-fill {
  height: 100%;
  background: linear-gradient(90deg, #3A5A8A 0%, #1A2F50 100%);
  border-radius: 999px;
}
.dl-now {
  position: absolute; top: 50%; transform: translate(-50%, -50%);
  width: 12px; height: 12px;
  background: #fff;
  border: 2px solid #E9A130;
  border-radius: 50%;
  box-shadow: 0 0 0 2px rgba(233,161,48,.3);
}
.dl-remain {
  font-size: 11px; color: var(--txt-3); margin-top: 6px; text-align: center;
  font-family: 'DM Mono', monospace;
}

/* ─── 橫向捲動預報 ───────────────────────────────────────── */
.hz-scroll {
  display: flex; overflow-x: auto; gap: 12px;
  padding-bottom: 8px; scrollbar-width: thin;
}
.hz-scroll::-webkit-scrollbar { height: 6px; }
.hz-scroll::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 10px; }
.hz-item {
  flex: 0 0 auto;
  display: flex; flex-direction: column; align-items: center;
  background: var(--bg-subtle);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 14px 12px; min-width: 76px;
}
.hz-item.hz-now {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.hz-time { font-size: 13px; font-family: 'DM Mono', monospace; color: var(--txt-3); margin-bottom: 8px; }
.hz-icon { font-size: 24px; margin-bottom: 8px; }
.hz-temp { font-size: 18px; font-weight: 600; font-family: 'DM Mono', monospace; margin-bottom: 8px; }
.hz-sub  { font-size: 13px; color: var(--txt-2); display: flex; align-items: center; gap: 4px; margin-top: 2px; }

/* ─── Data rows ──────────────────────────────────────────── */
.row {
  display: flex; align-items: center; padding: 10px 0;
  border-bottom: 1px solid var(--border); gap: 10px;
}
.row:last-child { border-bottom: none; }
.row-time   { color: var(--txt-3); width: 50px; flex-shrink: 0; font-size: 13px; font-family: 'DM Mono', monospace; }
.row-name   { font-weight: 600; width: 64px; flex-shrink: 0; font-size: 15px; }
.row-detail {
  font-size: 14px; color: var(--txt-2);
  flex: 1; min-width: 0; overflow: visible;
  white-space: normal; text-overflow: clip; line-height: 1.45;
}
.row-main,
.row-meta { display: block; }
.row-meta {
  font-size: 12px;
  color: var(--txt-3);
  margin-top: 2px;
}

/* ─── Badges ─────────────────────────────────────────────── */
.badge {
  font-size: 12px; font-weight: 500;
  padding: 4px 10px; border-radius: 20px;
  white-space: nowrap; flex-shrink: 0; letter-spacing: .01em;
}
.b-ok      { background: var(--ok-badge-bg);   color: var(--ok-badge-txt);   }
.b-caution { background: var(--warn-badge-bg); color: var(--warn-badge-txt); }
.b-danger  { background: var(--err-badge-bg);  color: var(--err-badge-txt);  }
.b-gray    { background: var(--bg-subtle);     color: var(--txt-3); border: 1px solid var(--border); }

/* ─── Tide grid ──────────────────────────────────────────── */
.tide-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 10px; margin-top: 10px;
}
.tide-cell {
  background: var(--bg-subtle); border-radius: var(--radius-md);
  padding: 10px 14px; border: 1px solid var(--border);
}
.tide-cell.tide-next-cycle {
  border-style: dashed;
  border-color: rgba(26,115,200,.35);
}
@media (prefers-color-scheme: dark) {
  .tide-cell.tide-next-cycle { border-color: rgba(75,159,225,.35); }
}
.tide-type { font-size: 12px; color: var(--txt-3); margin-bottom: 4px; letter-spacing: .04em; }
.tide-tm   { font-size: 20px; font-weight: 600; color: var(--txt); font-family: 'DM Mono', monospace; }
.tide-ht   { font-size: 14px; margin-top: 4px; font-family: 'DM Mono', monospace; }
.tide-ht.hi { color: var(--tide-hi); }
.tide-ht.lo { color: var(--tide-lo); }

.day-hdr {
  font-size: 15px; font-weight: 600;
  display: flex; align-items: center; gap: 8px;
  margin-top: 18px; margin-bottom: 6px; flex-wrap: wrap;
}
.day-hdr:first-child { margin-top: 0; }
.day-detail {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  margin-top: 12px;
}
.day-detail:first-child {
  border-top: none;
  padding-top: 0;
  margin-top: 0;
}
.day-detail > summary {
  cursor: pointer;
  list-style: none;
}
.day-detail > summary::-webkit-details-marker { display: none; }
.day-detail:not([open]) .day-hdr { margin-bottom: 0; }
.future-tide-group:not([open]) .future-tide-summary::after,
.collapse-summary::after {
  content: "展開";
  margin-left: auto;
  font-size: 11px;
  color: var(--txt-3);
  font-weight: 500;
}
.future-tide-group[open] .future-tide-summary::after,
.support-detail[open] .collapse-summary::after {
  content: "收合";
}
.day-detail.day-today > summary {
  cursor: default;
  pointer-events: none;
}
.future-tide-group { margin: 0; }
.future-tide-group > summary {
  cursor: pointer;
  list-style: none;
}
.future-tide-group > summary::-webkit-details-marker { display: none; }
.future-tide-summary {
  font-size: 15px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}
.future-tide-group[open] .future-tide-summary {
  margin-bottom: 8px;
}
.future-day {
  border-top: 1px solid var(--border);
  padding-top: 12px;
  margin-top: 12px;
}
.future-day:first-of-type {
  border-top: none;
  padding-top: 0;
  margin-top: 0;
}
.today-window-inline {
  border-top: 1px solid var(--border);
  margin-top: 12px;
  padding-top: 12px;
}
.inline-lbl {
  font-size: 12px;
  font-weight: 600;
  color: var(--txt-3);
  margin-bottom: 4px;
  letter-spacing: .04em;
}
.day-pill {
  font-size: 12px; font-weight: 500;
  padding: 3px 10px; border-radius: 20px;
  background: var(--accent-dim); color: var(--accent);
  border: 1px solid rgba(26,115,200,.18);
}
@media (prefers-color-scheme: dark) {
  .day-pill { border-color: rgba(75,159,225,.25); }
}

.support-detail {
  margin-bottom: 14px;
}
.support-detail > summary {
  cursor: pointer;
  list-style: none;
}
.support-detail > summary::-webkit-details-marker { display: none; }
.collapse-summary {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: .07em;
  text-transform: uppercase;
  color: var(--txt-3);
  margin: 20px 0 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.support-detail .card { margin-bottom: 0; }

/* ─── 趕潮窗口 ───────────────────────────────────────────── */
.window-row {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px;
}
.window-row:last-of-type { border-bottom: none; }
.window-list .window-row:last-child { border-bottom: none; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot-g { background: #58A834; }
.dot-r { background: #E14B4B; }
.dot-y { background: #E59B20; }
.win-time   { font-weight: 600; min-width: 124px; font-family: 'DM Mono', monospace; font-size: 14px; }
.win-detail { flex: 1; color: var(--txt-2); }
.stars      { color: #E59B20; font-size: 13px; letter-spacing: 1.5px; }

.info-note { font-size: 13px; color: var(--txt-3); margin-top: 10px; line-height: 1.55; }
.info-note:first-child { margin-top: 0; }

.ext-link {
  font-size: 13px; color: var(--link); text-decoration: none;
  display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; font-weight: 500;
}
.ext-link:hover { text-decoration: underline; }

.err-box {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 32px 24px;
  text-align: center; color: var(--txt-2); font-size: 15px;
  line-height: 1.6; box-shadow: var(--shadow-sm);
}

/* ─── 2-col grid ─────────────────────────────────────────── */
@media (min-width: 600px) {
  .page { padding: 32px 32px 64px; }
  .two-col {
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
    gap: 20px; align-items: start;
  }
  .two-col .section-lbl { margin-top: 0; }
  .col-wrap { display: flex; flex-direction: column; gap: 20px; min-width: 0; }
  .full { grid-column: 1 / -1; min-width: 0; }
}

/* ─── Mobile first-view tuning ───────────────────────────── */
@media (max-width: 520px) {
  body { font-size: 15px; }
  .page {
    padding: 8px 8px 28px;
    max-width: 100%;
  }
  .two-col {
    display: flex;
    flex-direction: column;
  }
  .today-col { order: 1; }
  .today-window { order: 2; }
  .support-col { order: 3; }
  .ext-full { order: 4; }
  .topbar {
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .title { font-size: 15px; }
  .meta  { font-size: 11px; margin-top: 2px; }
  #refresh {
    font-size: 11px;
    padding: 6px 10px;
  }
  .section-lbl {
    font-size: 12px;
    letter-spacing: .04em;
    margin: 10px 0 6px;
  }
  .card,
  .quick-summary {
    border-radius: var(--radius-lg);
    padding: 10px;
    margin-bottom: 8px;
  }
  .quick-kicker {
    display: inline;
    font-size: 11px;
    margin-right: 8px;
  }
  .quick-title {
    display: none;
  }
  .decision-list {
    gap: 6px;
    margin-top: 7px;
  }

<script>
const BASE    = "https://opendata.cwa.gov.tw/api/v1/rest/datastore";
const TZ      = "Asia/Taipei";
const TOWN_COASTAL_PLOT = "https://www.cwa.gov.tw/Data/js/towncoastal/plot/1001009C01.js";
const OBS_STATIONS = {C0M710:"東石", CAL090:"西濱北", CAL100:"西濱南"};
const BOAT_WAVE_LIMIT = 0.5;
const BOAT_BFT_LIMIT = 3;
const WEEKDAYS   = ["日","一","二","三","四","五","六"];
const LUNAR_MONTH = ["","正","二","三","四","五","六","七","八","九","十","冬","臘"];
const LUNAR_DAY   = ["","初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
  "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
  "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];

/* ─── 暫存（localStorage）────────────────────────────────── */
const CACHE_NS  = "bjkw_v2";
const CACHE_MAX = 60 * 60 * 1000; // 60 分鐘內視為有效

function saveCache(key, data) {
  try {
    localStorage.setItem(`${CACHE_NS}_${key}`, JSON.stringify({ ts: Date.now(), data }));
  } catch(e) {
    console.warn("暫存寫入失敗", key, e);
  }
}
function loadCache(key) {
  try {
    const raw = localStorage.getItem(`${CACHE_NS}_${key}`);
    if (!raw) return null;
    const hit = JSON.parse(raw); // { ts, data }
    if (!hit || typeof hit.ts !== "number" || Date.now() - hit.ts > CACHE_MAX) {
      localStorage.removeItem(`${CACHE_NS}_${key}`);
      return null;
    }
    return hit;
  } catch(e) { return null; }
}
function cacheAge(ts) {
  const m = Math.round((Date.now() - ts) / 60000);
  return m < 60 ? `${m} 分鐘前` : `${Math.round(m/60)} 小時前`;
}

/* 嘗試資料載入，失敗回傳有效暫存；沒有資料時保留錯誤狀態 */
async function tryFetch(ep, params, cacheKey) {
  try {
    const data = await apiFetch(ep, params);
    saveCache(cacheKey, data);
    return { data, cached: false, ok: true, error: null };
  } catch(e) {
    const hit = loadCache(cacheKey);
    if (hit) return { data: hit.data, cached: true, ts: hit.ts, ok: true, error: e };
    return { data: null, cached: false, ok: false, error: e };
  }
}

async function tryLoadTownCoastalPlot(url, cacheKey) {
  try {
    const data = await loadTownCoastalPlot(url);
    saveCache(cacheKey, data);
    return { data, cached: false, ok: true, error: null };
  } catch(e) {
    const hit = loadCache(cacheKey);
    if (hit) return { data: hit.data, cached: true, ts: hit.ts, ok: true, error: e };
    return { data: null, cached: false, ok: false, error: e };
  }
}

function loadTownCoastalPlot(url) {
  return new Promise((resolve, reject) => {
    const script = document.createElement("script");
    const cleanup = () => {
      script.remove();
      delete window.ChartType;
      delete window.ST_Name;
      delete window.Time;
      delete window.TimeRange;
      delete window.Wind_Data;
      delete window.Wave_Data;
    };

    cleanup();
    script.src = `${url}?T=${Date.now()}`;
    script.async = true;
    script.onload = () => {
      const data = {
        Time: Array.isArray(window.Time) ? [...window.Time] : [],
        Wave_Data: Array.isArray(window.Wave_Data) ? [...window.Wave_Data] : [],
        TimeRange: typeof window.TimeRange === "string" ? window.TimeRange : "",
      };
      cleanup();
      if (!data.Time.length || !data.Wave_Data.length) {
        reject(new Error("東石浪高資料格式不完整"));
        return;
      }
      resolve(data);
    };
    script.onerror = () => {
      cleanup();
      reject(new Error("東石浪高資料載入失敗"));
    };
    document.head.appendChild(script);
  });
}

async function apiFetch(ep, params) {
  throw new Error("資料來源未設定");
}

function now() { return new Date(); }
function twDateKey(dt) {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: TZ, year: "numeric", month: "2-digit", day: "2-digit"
  }).formatToParts(dt).reduce((acc, p) => {
    if (p.type !== "literal") acc[p.type] = p.value;
    return acc;
  }, {});
  return `${parts.year}-${parts.month}-${parts.day}`;
}
function twDateParts(dt) {
  return twDateKey(dt).split("-").map(Number);
}
function twHour(dt) {
  const hour = new Intl.DateTimeFormat("en-US", {
    timeZone: TZ, hour: "2-digit", hour12: false
  }).formatToParts(dt).find(p => p.type === "hour")?.value ?? "0";
  return Number(hour) % 24;
}
function addDays(dt, days) {
  return new Date(dt.getTime() + days * 86400000);
}
function monthDayKey(mmdd, baseDate) {
  const m = mmdd.match(/(\d{1,2})\/(\d{1,2})/);
  if (!m) return null;
  const [baseYear, baseMonth] = twDateParts(baseDate);
  const month = Number(m[1]);
  const day = Number(m[2]);
  let year = baseYear;
  if (baseMonth === 12 && month === 1) year += 1;
  if (baseMonth === 1 && month === 12) year -= 1;
  return `${year}-${String(month).padStart(2, "0")}-${String(day).padStart(2, "0")}`;
}

/* ─── 蒲福風級 ────────────────────────────────────────────── */
function bft(ms) {
  const v = parseFloat(ms);
  if (isNaN(v) || v < 0) return null;
  if (v < 0.3)  return 0; if (v < 1.6)  return 1; if (v < 3.4)  return 2;
  if (v < 5.5)  return 3; if (v < 8.0)  return 4; if (v < 10.8) return 5;
  if (v < 13.9) return 6; if (v < 17.2) return 7; return 8;
}
function bftLabel(b) { return ["無風","軟風","輕風","微風","和風","清風","強風","疾風","大風"][b] || "—"; }
function bftBadge(b) {
  if (b == null) return `<span class="badge b-gray">—</span>`;
  const cls = b <= 3 ? "b-ok" : b <= 4 ? "b-caution" : "b-danger";
  return `<span class="badge ${cls}">${b}級 ${bftLabel(b)}</span>`;
}
function boatDecisionFromRules(maxWaveHeight, maxBft, hasMissingData) {
  if (hasMissingData) return { cls: "unknown", main: "資料不足" };
  return maxWaveHeight <= BOAT_WAVE_LIMIT && maxBft <= BOAT_BFT_LIMIT
    ? { cls: "ok", main: "可出船" }
    : { cls: "caution", main: "暫緩" };
}
function parseBftValue(v) {
  const clean = valid(v);
  if (clean == null) return null;
  const match = String(clean).match(/\d+/);
  return match ? Number(match[0]) : null;
}

function esc(v) {
  return String(v ?? "—").replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
  }[c]));
}
function show(v, suffix = "") {
  return v == null ? "—" : `${esc(v)}${suffix}`;
}

/* ─── 天氣圖示 ───────────────────────────────────────────── */
function wxIcon(w) {
  if (!w) return "🌤";
  if (w.includes("雷")) return "⛈";
  if (w.includes("雨")) return "🌧";
  if (w.includes("陰")) return "☁";
  if (w.includes("多雲")) return "⛅";
  if (w.includes("晴")) return "☀";
  return "🌤";
}

function valid(v) {
  const s = String(v ?? "").trim();
  return (!s || s === "X" || Number(s) === -99) ? null : v;
}
function validRain(v) {
  const s = String(v ?? "").trim();
  if (!s || s === "X" || Number(s) === -99) return null;
  if (Number(s) === -98) return "0.0";
  return v;
}
function showRain(v) {
  if (v == null) return "—";
  if (String(v).trim() === "T") return "雨跡";
  return `${esc(v)}mm`;
}
function showMeters(v) {
  return v == null ? "—" : `${esc(v)}m`;
}
function windDirText(v) {
  const clean = valid(v);
  if (clean == null) return "—";
  const deg = parseFloat(clean);
  if (deg === 990) return "不定";
  if (Number.isNaN(deg)) return String(clean);
  const dirs = ["北","東北","東","東南","南","西南","西","西北"];
  return dirs[Math.round(deg / 45) % 8];
}
function fmtTime(dt) { return dt.toTimeString().slice(0, 5); }
function fmtDate(s)  { return s.slice(5); }

/* ─── 取整點時刻（往下取整到當前整點）───────────────────── */
function floorHour(dt) {
  const r = new Date(dt);
  r.setMinutes(0, 0, 0);
  return r;
}

/* ─── 預報解析 ───────────────────────────────────────────── */
function parseForecast(data, target) {
  const res = {};
  if (!data) return res;
  try {
    for (const loc of data.records.Locations) {
      for (const l of loc.Location) {
        if (l.LocationName.includes(target)) {
          for (const e of l.WeatherElement) {
            const name = e.ElementName; res[name] = {};
            for (const t of (e.Time || [])) {
              const dtk = t.DataTime || t.StartTime || "";
              if (!dtk) continue;
              const key = dtk.slice(0,10) + "_" + parseInt(dtk.slice(11,13));
              res[name][key] = t.ElementValue[0];
            }
          }
        }
      }
    }
  } catch(e) {
    console.warn("預報解析失敗", target, e);
  }
  return res;
}

function parseTownCoastalPlot(data, baseDate) {
  const res = { "浪高": {} };
  if (!data?.Time?.length || !data?.Wave_Data?.length) return res;
  try {
    data.Time.forEach((label, index) => {
      const [hourPart, datePart] = String(label).split("<br>");
      const hour = parseInt(hourPart, 10);
      const date = monthDayKey(datePart || "", baseDate);
      const waveHeight = valid(data.Wave_Data[index]);
      if (!date || Number.isNaN(hour) || waveHeight == null) return;
      res["浪高"][`${date}_${hour}`] = { WaveHeight: waveHeight };
    });
    if (!Object.keys(res["浪高"]).length) {
      throw new Error("沒有可用浪高時序");
    }
    const keys = Object.keys(res["浪高"]).sort((a, b) => {
      const [ad, ah] = a.split("_");
      const [bd, bh] = b.split("_");
      return new Date(`${ad}T${String(ah).padStart(2, "0")}:00:00`) -
             new Date(`${bd}T${String(bh).padStart(2, "0")}:00:00`);
    });
    res._meta = {
      first: waveKeyLabel(keys[0]),
      last: waveKeyLabel(keys[keys.length - 1]),
      interval: "逐 3 小時",
      sourceRange: typeof data.TimeRange === "string" ? data.TimeRange : "",
    };
  } catch(e) {
    console.warn("東石沿海浪高解析失敗", e);
  }
  return res;
}

function waveKeyLabel(key) {
  const [date, hour] = String(key || "").split("_");
  if (!date || hour == null) return "";
  return `${date.slice(5).replace("-", "/")} ${String(hour).padStart(2, "0")}:00`;
}

function nearestEntry(data, field, dt) {
  const d = data[field] || {};
  const date = twDateKey(dt);
  const hour = twHour(dt);
  const cands = Object.entries(d).filter(([k]) => k.startsWith(date));
  if (!cands.length) return null;
  cands.sort((a, b) => Math.abs(parseInt(a[0].split("_")[1]) - hour) - Math.abs(parseInt(b[0].split("_")[1]) - hour));
  return { key: cands[0][0], value: cands[0][1] };
}

function nearest(data, field, dt) {
  const hit = nearestEntry(data, field, dt);
  return hit ? hit.value : null;
}

/* ─── 天文資料解析（多格式容錯）────────────────────────── */
function parseAstro(astro, today) {
  if (!astro) return { sunrise: "—", sunset: "—" };
  try {
    const r = astro.records;
    let locs = [];
    if (Array.isArray(r?.locations?.location))         locs = r.locations.location;
    else if (r?.locations?.location)                   locs = [r.locations.location];
    else if (Array.isArray(r?.locations))              locs = r.locations;
    else if (Array.isArray(r?.location))               locs = r.location;
    if (!locs.length) return { sunrise: "—", sunset: "—" };

    const loc = locs.find(l => l.CountyName === "嘉義市") || locs[0];
    if (!loc) return { sunrise: "—", sunset: "—" };

    const times = Array.isArray(loc.time) ? loc.time : [];
    const t = times.find(x => x.Date === today) || times[0];
    if (!t) return { sunrise: "—", sunset: "—" };

    let sunrise = t.SunRiseTime || t.sunRiseTime || t.sunrise || "";
    let sunset  = t.SunSetTime  || t.sunSetTime  || t.sunset  || "";

    if ((!sunrise || !sunset) && Array.isArray(t.parameter)) {
      for (const p of t.parameter) {
        const n = p.parameterName || "";
        const v = p.parameterValue || "";
        if (n === "日出" || n.toLowerCase() === "sunrise") sunrise = sunrise || v;
        if (n === "日沒" || n.toLowerCase() === "sunset")  sunset  = sunset  || v;
      }
    }
    sunrise = sunrise ? sunrise.slice(0, 5) : "—";
    sunset  = sunset  ? sunset.slice(0, 5)  : "—";
    return { sunrise, sunset };
  } catch(e) {
    console.error("天文資料解析失敗", e);
    return { sunrise: "—", sunset: "—" };
  }
}

/* ─── 日光條 HTML ────────────────────────────────────────── */
function daylightBarHtml(sunrise, sunset, n) {
  // 解析時間字串為今天的 Date 物件
  function parseTime(str) {
    if (!str || str === "—") return null;
    const [h, m] = str.split(":").map(Number);
    const d = new Date(n);
    d.setHours(h, m, 0, 0);
    return d;
  }

  const srDt = parseTime(sunrise);
  const ssDt = parseTime(sunset);
  const nowMs = n.getTime();

  // 剩餘時間字串
  function remainStr() {
    if (!srDt || !ssDt) return "";
    if (nowMs < srDt.getTime()) {
      const diffM = Math.round((srDt.getTime() - nowMs) / 60000);
      return `距日出 ${Math.floor(diffM/60)}h${diffM%60}m`;
    }
    if (nowMs <= ssDt.getTime()) {
      const diffM = Math.round((ssDt.getTime() - nowMs) / 60000);
      return `日落倒數 ${Math.floor(diffM/60)}h${diffM%60}m`;
    }
    return "日已落";
  }

  // 進度百分比（限 0~100）
  let pct = 0;
  let isDaytime = false;
  if (srDt && ssDt) {
    const total = ssDt.getTime() - srDt.getTime();
    const elapsed = nowMs - srDt.getTime();
    isDaytime = elapsed >= 0 && elapsed <= total;
    if (elapsed < 0) pct = 0;
    else if (elapsed > total) pct = 100;
    else pct = Math.round(elapsed / total * 100);
  }

  const hasData = srDt && ssDt;
  const fillColor = isDaytime
    ? `background: linear-gradient(90deg, #F5A623, #FFD166 ${pct}%, transparent ${pct}%)`
    : `background: linear-gradient(90deg, #3A5A8A, #1A2F50)`;

  const dotHtml = hasData
    ? `<div class="dl-now" style="left:${pct}%"></div>`
    : "";

  const srLabel = hasData ? `🌅 ${esc(sunrise)}` : `🌅 —`;
  const ssLabel = hasData ? `🌇 ${esc(sunset)}` : `🌇 —`;

  return `
    <div class="daylight-wrap">
      <div class="daylight-lbl">日光時段</div>
      <div class="daylight-row">
        <span class="dl-time">${srLabel}</span>
        <div class="dl-track">
          <div style="height:100%; border-radius:999px; ${fillColor};"></div>
          ${dotHtml}
        </div>
        <span class="dl-time">${ssLabel}</span>
      </div>
      ${hasData ? `<div class="dl-remain">${remainStr()}</div>` : ""}
    </div>`;
}

function syncTodayModeDetails() {
  const isMobile = window.matchMedia("(max-width: 520px)").matches;
  document.querySelectorAll("details.today-mode-detail").forEach(detail => {

/* ─── 主要載入函式 ────────────────────────────────────────── */
async function loadAll() {
  const btn     = document.getElementById("refresh");
  const content = document.getElementById("content");
  const meta    = document.getElementById("meta");
  btn.disabled  = true;
  btn.textContent = "重新整理";

  content.innerHTML = `<div class="err-box">
    資料來源未設定，頁面目前僅保留介面展示。<br><br>
    <span class="info-note">公開版本不在前端保存外部資料來源授權資料。</span>
  </div>`;
  meta.textContent = "資料來源未設定";
  btn.disabled = false;
  return;

  try {
    const n     = now();
    const today = twDateKey(n);
    const tomorrow = twDateKey(addDays(n, 1));

    // 並行取得所有資料（自動 fallback 至暫存）
    const [obsRes, cityRes, windRes, tideRes, astroRes, marineRes] = await Promise.all([
      tryFetch("O-A0001-001", {}, "obs"),
      tryFetch("F-D0047-057", { LocationName: "東區" }, "city"),
      tryFetch("F-D0047-029", { LocationName: "東石鄉" }, "sea"),
      tryFetch("F-A0021-001", { LocationName: "嘉義縣東石鄉" }, "tide"),
      tryFetch("A-B0062-001", { CountyName: "嘉義市", timeFrom: today, timeTo: tomorrow }, "astro"),
      tryLoadTownCoastalPlot(TOWN_COASTAL_PLOT, "marine"),
    ]);

    // 判斷是否有任何暫存資料被使用
    const usedCache = [obsRes, cityRes, windRes, tideRes, astroRes, marineRes]
      .filter(r => r.cached);
    const cacheTs = usedCache.length
      ? Math.min(...usedCache.map(r => r.ts))
      : null;

    const failedFeeds = [
      ["即時觀測", obsRes],
      ["城市預報", cityRes],
      ["海風預報", windRes],
      ["潮汐", tideRes],
      ["日出日落", astroRes],
      ["東石浪高", marineRes],
    ].filter(([, r]) => !r.ok && !r.data).map(([name]) => name);

    const obs   = obsRes.data;
    const city  = cityRes.data  ? parseForecast(cityRes.data,  "東區") : {};
    const sea   = windRes.data  ? parseForecast(windRes.data,  "東石") : {};
    const tide  = tideRes.data;
    const astro = astroRes.data;
    const marine = marineRes.data ? parseTownCoastalPlot(marineRes.data, n) : {};
    const waveTimeInfo = marine._meta?.first && marine._meta?.last
      ? `資料時段：${esc(marine._meta.first)}–${esc(marine._meta.last)}。`
      : "";

    let maxObsBft = null, maxFcstBft = null, maxWaveHeight = null;

    const { sunrise, sunset } = parseAstro(astro, today);

    /* ── 觀測站 ────────────────────────────────────────────── */
    let obsRows = "";
    if (obs?.records?.Station) {
      const stations = obs.records.Station.filter(s => OBS_STATIONS[s.StationId]);
      for (const s of stations) {
        const we   = s.WeatherElement;
        const name = OBS_STATIONS[s.StationId];
        const wspd = valid(we.WindSpeed);
        const wdir = valid(we.WindDirection);
        const temp = valid(we.AirTemperature);
        const humi = valid(we.RelativeHumidity);
        const rain = validRain(we.Now?.Precipitation);
        const wx   = valid(we.Weather) || "—";
        const b    = bft(wspd);
        if (b != null && (maxObsBft == null || b > maxObsBft)) maxObsBft = b;
        const dirStr = windDirText(wdir);
        obsRows += `<div class="row row-observation">
          <span class="row-name">${esc(name)}</span>
          <span class="row-detail">
            <span class="row-main">${wxIcon(wx)} ${esc(wx)} · ${esc(dirStr)}風 ${show(wspd, "m/s")}</span>
            <span class="row-meta">${show(temp, "°C")} · 雨量 ${showRain(rain)}</span>
          </span>
          ${bftBadge(b)}
        </div>`;
      }
    }

    /* ── 當前天氣重點 ──────────────────────────────────────── */
    const curTmp = nearest(city, "溫度", n);
    const curAT  = nearest(city, "體感溫度", n);
    const curHum = nearest(city, "相對濕度", n);
    const curPop = nearest(city, "3小時降雨機率", n);
    const curWx  = nearest(city, "天氣現象", n);
    const curWxStr = valid(curWx?.Weather) || "—";

    const currentFocusHtml = `
      <div class="current-focus">
          <div class="cf-icon">${wxIcon(curWxStr)}</div>
          <div class="cf-data">
          <div class="cf-temp">${show(curTmp?.Temperature, "°C")}</div>
          <div class="cf-desc">${esc(curWxStr)}</div>
          <div class="cf-sub">
            <span title="體感溫度">體感 ${show(curAT?.ApparentTemperature, "°C")}</span>
            <span title="相對濕度">💧 濕度 ${show(curHum?.RelativeHumidity, "%")}</span>
            <span title="3小時降雨機率">☔ 降雨 ${show(curPop?.ProbabilityOfPrecipitation, "%")}</span>
          </div>
        </div>
      </div>`;

    /* ── 6 小時整點預報 ─────────────────────────────────────
       從「目前整點」起，依序取 +0h ~ +6h，共 7 個整點
    ────────────────────────────────────────────────────────── */
    const baseHour = floorHour(n);
    let hzRows = "";
    for (let i = 0; i <= 6; i++) {
      const t = new Date(baseHour.getTime() + i * 3600000);
      const tmp = nearest(city, "溫度", t);
      const hum = nearest(city, "相對濕度", t);
      const pop = nearest(city, "3小時降雨機率", t);
      const wx  = nearest(city, "天氣現象", t);
      const wxStr = valid(wx?.Weather) || "—";
      const isNow = i === 0;
      const hourLabel = String(twHour(t)).padStart(2,'0');
      const label = isNow
        ? `${hourLabel}:00<br><small style="font-size:10px;color:var(--accent)">現在</small>`
        : `${hourLabel}:00`;
      hzRows += `<div class="hz-item${isNow ? ' hz-now' : ''}">
        <span class="hz-time" style="text-align:center">${label}</span>
        <span class="hz-icon">${wxIcon(wxStr)}</span>
        <span class="hz-temp">${show(tmp?.Temperature, "°C")}</span>
        <span class="hz-sub" title="相對濕度">💧 ${show(hum?.RelativeHumidity, "%")}</span>
        <span class="hz-sub" title="降雨機率">☔ ${show(pop?.ProbabilityOfPrecipitation, "%")}</span>
      </div>`;
    }

    /* ── 海風與浪高概況（未來 6 小時）──────────────────────── */
    let windRows = "";
    for (let i = 0; i <= 6; i++) {
      const t    = new Date(baseHour.getTime() + i * 3600000);
      const spd  = nearest(sea, "風速", t);
      const wdir = nearest(sea, "風向", t);
      const wx   = nearest(sea, "天氣現象", t);
      const waveHit = nearestEntry(marine, "浪高", t);
      const wave = waveHit?.value;
      const bftN = parseBftValue(spd?.BeaufortScale);
      if (bftN != null && (maxFcstBft == null || bftN > maxFcstBft)) maxFcstBft = bftN;
      const waveH = valid(wave?.WaveHeight);
      const waveN = waveH != null ? parseFloat(waveH) : null;
      if (waveN != null && !Number.isNaN(waveN) && (maxWaveHeight == null || waveN > maxWaveHeight)) maxWaveHeight = waveN;
      const wxStr = valid(wx?.Weather) || "—";
      const timeLabel = `${String(twHour(t)).padStart(2,'0')}:00`;
      const waveLabel = waveHit
        ? `浪高時段 ${waveKeyLabel(waveHit.key)}`
        : "浪高 —";
      if (i === 0 || i === 2 || i === 4 || i === 6) {
        windRows += `<div class="row row-wave">
          <span class="row-time">${timeLabel}</span>
          <span class="row-detail">
            <span class="row-main">${show(wdir?.WindDirection)} · ${show(spd?.WindSpeed, "m/s")} · 浪 ${showMeters(wave?.WaveHeight)}</span>
            <span class="row-meta">${waveLabel}</span>
          </span>
          ${bftBadge(bftN)}
        </div>`;
      }
    }

    /* ── 潮汐 ─────────────────────────────────────────────── */
    let todayTideHtml = "";
    let futureTideSectionHtml = "";
    let dryTides = [];
    if (tide) {
      try {
        const daily    = tide.records.TideForecasts[0].Location.TimePeriods.Daily;
        const upcoming = daily.filter(d => d.Date >= today)
                              .sort((a,b) => a.Date > b.Date ? 1 : -1)
                              .slice(0, 3);
        let futureTideHtml = "";
        let futureTideDates = [];
        for (const [dayIndex, day] of upcoming.entries()) {
          const date   = day.Date;
          const lunar  = day.LunarDate || "";
          const lunarStr = lunar
            ? `農曆${LUNAR_MONTH[+lunar.split("-")[1]] || ""}月${LUNAR_DAY[+lunar.split("-")[2]] || ""}`
            : "";
          const trange = day.TideRange || "";
          const wday   = WEEKDAYS[new Date(date + "T00:00:00").getDay()];
          const events = day.Time || [];
          const isToday = date === today;
          let dayCells = "";
          const nextDay = upcoming[dayIndex + 1];
          const nextEvent = nextDay?.Time?.[0];
          const displayEvents = events.map(ev => ({ ev, sourceDate: date, isNextCycle: false }));
          if (isToday && events.length % 2 === 1 && nextEvent) {
            displayEvents.push({ ev: nextEvent, sourceDate: nextDay.Date, isNextCycle: true });
          }
          for (const { ev, sourceDate, isNextCycle } of displayEvents) {
            const evDt = new Date(ev.DateTime);
            const isHi = ev.Tide === "滿潮";
            const h    = parseInt(ev.TideHeights?.AboveTWVD || 0);
            if (!isHi && sourceDate === today) dryTides.push({ dt: evDt, h });
            const cyclePeriod = isNextCycle ? "翌日" : (twHour(evDt) < 12 ? "上午" : "下午");
            const cycleClass = isNextCycle ? " tide-next-cycle" : "";
            dayCells += `<div class="tide-cell${cycleClass}">
              <div class="tide-type">${isHi ? "▲ 滿潮" : "▽ 乾潮"} ${cyclePeriod}</div>
              <div class="tide-tm">${fmtTime(evDt)}</div>
              <div class="tide-ht ${isHi ? 'hi' : 'lo'}">${h > 0 ? "+" : ""}${h} cm</div>
            </div>`;
          }
          const dayHeader = `
            ${esc(fmtDate(date))} 週${esc(wday)}
            ${isToday ? '<span class="day-pill">今日</span>' : ""}
            <span class="day-pill">${esc(lunarStr)}</span>
            <span class="day-pill">${show(trange, "潮")}</span>`;
          if (isToday) {
            todayTideHtml += `<details class="day-detail today-mode-detail day-today" data-mobile-open="true" open>
              <summary class="day-hdr">${dayHeader}</summary>
              <div class="tide-grid">${dayCells}</div>
            </details>`;
          } else {
            futureTideDates.push(fmtDate(date));
            futureTideHtml += `<div class="future-day">
              <div class="day-hdr">${dayHeader}</div>
              ${dayCells ? `<div class="tide-grid">${dayCells}</div>` : '<div class="info-note">潮汐資料無法取得</div>'}
            </div>`;
          }
        }
        if (futureTideHtml) {
          futureTideSectionHtml = `<details class="future-tide-group today-mode-detail" data-mobile-open="false">
            <summary class="future-tide-summary">
              明後天潮汐
              <span class="day-pill">${esc(futureTideDates.join(" / "))}</span>
            </summary>
            ${futureTideHtml}
          </details>`;
        }
      } catch(e) { todayTideHtml = `<div class="info-note">潮汐解析錯誤</div>`; }
    }

    /* ── 趕潮窗口 ─────────────────────────────────────────── */
    let windowHtml = "";
    for (const { dt, h } of dryTides) {
      const s   = new Date(dt.getTime() - 2 * 3600000);
      const e   = new Date(dt.getTime() + 2 * 3600000);
      const cls = h < -40 ? "dot-g" : h < 0 ? "dot-y" : "dot-r";
      const stars = h < -40 ? "★★★" : h < 0 ? "★★" : "★";
      windowHtml += `<div class="window-row">
        <div class="dot ${cls}"></div>
        <span class="win-time">${fmtTime(s)} – ${fmtTime(e)}</span>
        <span class="win-detail">乾潮 ${fmtTime(dt)}（${h > 0 ? "+" : ""}${h}cm）</span>
        <span class="stars">${stars}</span>
      </div>`;
    }
    const todayWindowInlineHtml = windowHtml
      ? `<div class="today-window-inline">
           <div class="inline-lbl">今日潮窗</div>
           <div class="window-list">${windowHtml}</div>
           <div class="info-note">★ 依潮高估算，非官方流速資料</div>
         </div>`
      : "";
    const todayTideCardHtml = todayTideHtml
      ? `${todayTideHtml}${todayWindowInlineHtml}`
      : '<div class="info-note">潮汐資料無法取得</div>';

    /* ── 首屏快速判斷 ─────────────────────────────────────── */
    const missingSafetyData = [];
    if (maxObsBft == null) missingSafetyData.push("即時觀測風速");
    if (maxFcstBft == null) missingSafetyData.push("海風預報風速");
    if (maxWaveHeight == null) missingSafetyData.push("東石浪高");
    const maxBft = missingSafetyData.length ? null : Math.max(maxObsBft, maxFcstBft);
    const tideWindows = dryTides
      .map(({ dt, h }) => ({
        s: new Date(dt.getTime() - 2 * 3600000),
        e: new Date(dt.getTime() + 2 * 3600000),
        dt,
        h,
      }))
      .sort((a, b) => a.s - b.s);
    const nextTideWindow = tideWindows.find(w => w.e >= n) || null;
    const tideWindowText = nextTideWindow
      ? `${fmtTime(nextTideWindow.s)}-${fmtTime(nextTideWindow.e)}`
      : tideWindows.length ? "今日已過" : "—";
    const windMetricText = missingSafetyData.length ? "—" : `${maxObsBft}/${maxFcstBft}級`;
    const waveMetricText = maxWaveHeight == null ? "—" : `${maxWaveHeight.toFixed(1)}m`;

    let shoreDecision;
    if (missingSafetyData.length) {
      shoreDecision = { cls: "unknown", main: "看資料" };
    } else {
      shoreDecision = maxBft >= 7 || maxWaveHeight >= 2.5
        ? { cls: "danger", main: "先暫緩" }
        : maxBft >= 5 || maxWaveHeight >= 1.5
          ? { cls: "caution", main: "看場況" }
          : { cls: "ok", main: "可岸釣" };
    }
    const boatDecision = boatDecisionFromRules(maxWaveHeight, maxBft, missingSafetyData.length > 0);

    const decisionLine = (label, d) => `<div class="decision-line ${d.cls}">
      <div class="decision-label">${label}</div>
      <div class="decision-main">${d.main}</div>
    </div>`;
    const quickNoteHtml = missingSafetyData.length
      ? `缺少 ${missingSafetyData.join("、")}，出船顯示資料不足。`
      : "出船看未來6小時：浪≤0.5m、風≤3級；岸釣另看潮窗。";
    const quickSummaryHtml = `<div class="quick-summary">
      <div class="quick-kicker">今日初判</div>
      <div class="quick-title">岸釣與出船</div>
      <div class="decision-list">
        ${decisionLine("岸邊釣魚", shoreDecision)}
        ${decisionLine("出船", boatDecision)}
      </div>
      <div class="quick-metrics">
        <div class="quick-metric"><span>潮窗</span><strong>${tideWindowText}</strong></div>
        <div class="quick-metric"><span>風 現/預</span><strong>${windMetricText}</strong></div>
        <div class="quick-metric"><span>最高浪</span><strong>${waveMetricText}</strong></div>
      </div>
      <div class="quick-note">${quickNoteHtml}</div>
    </div>`;

    /* ── 暫存橫幅 ─────────────────────────────────────────── */
    const cacheBannerHtml = usedCache.length
      ? `<div class="cache-banner">
           <span class="cb-icon">⚠</span>
           <span>部分資料無法取得，目前顯示暫存資料（${cacheAge(cacheTs)}）。請確認網路後重新整理。</span>
         </div>`
      : "";
    const errorBannerHtml = failedFeeds.length
      ? `<div class="cache-banner">
           <span class="cb-icon">⚠</span>
           <span>部分資料載入失敗：${esc(failedFeeds.join("、"))}。相關區塊與快速判斷已保守降級。</span>
         </div>`
      : "";

    /* ── 日光條 ───────────────────────────────────────────── */
    const daylightHtml = daylightBarHtml(sunrise, sunset, n);

    /* ── 組裝 HTML ──────────────────────────────────────────── */
    content.innerHTML = `
      ${cacheBannerHtml}
      ${errorBannerHtml}

      ${quickSummaryHtml}

      <div class="two-col">

        <div class="col-wrap today-col">
          <div>
            <div class="section-lbl">東區天氣（6 小時）</div>
            <div class="card">
              ${currentFocusHtml}
              <div class="g2">
                <div class="metric">
                  <div class="metric-lbl">溫度</div>
                  <div class="metric-val">${show(curTmp?.Temperature, "°C")}</div>
                </div>
                <div class="metric">
                  <div class="metric-lbl">體感溫度</div>
                  <div class="metric-val">${show(curAT?.ApparentTemperature, "°C")}</div>
                </div>
              </div>
              ${daylightHtml}
              <div class="hz-scroll">${hzRows}</div>
            </div>
          </div>

          <div>
            <div class="section-lbl">今日潮汐</div>
            <div class="card">${todayTideCardHtml}</div>
          </div>

          ${futureTideSectionHtml ? `<div class="future-tide-col">
            <div class="card">${futureTideSectionHtml}</div>
          </div>` : ""}
        </div>

        <div class="col-wrap support-col">
          <details class="support-detail today-mode-detail" data-mobile-open="false">
            <summary class="collapse-summary">東石風浪（6 小時）</summary>
            <div class="card">
              ${windRows}
              <div class="info-note">浪高為逐 3 小時示性波高；最大波高可能約為 2 倍。${waveTimeInfo}</div>
            </div>
          </details>

          <details class="support-detail today-mode-detail" data-mobile-open="false">
            <summary class="collapse-summary">測站即時風</summary>
            <div class="card">${obsRows || '<div class="info-note">觀測資料無法取得</div>'}</div>
          </details>
        </div>

        <div class="full ext-full" style="margin-top:4px">
          <a class="ext-link" href="https://www.cwa.gov.tw/V8/C/M/TownCoastal/TownCoastal.html?cID=10010&pointID=1001009C01" target="_blank" rel="noopener noreferrer">
            完整沿海預報（浪高／流速）→
          </a>
        </div>

      </div>
    `;
    syncTodayModeDetails();

    meta.textContent = `最後更新：${n.toLocaleTimeString("zh-TW", { hour: "2-digit", minute: "2-digit" })}`;

  } catch(err) {
    const errMsg = String(err?.message || err);
    content.innerHTML = `<div class="err-box">
      ⚠ 資料載入失敗，請稍後再試。<br><br><span class="info-note">${esc(errMsg)}</span>
    </div>`;
    meta.textContent = "載入失敗";
  }

  btn.disabled = false;
  btn.textContent = "重新整理";
}

loadAll();
</script>
</body>
</html>
