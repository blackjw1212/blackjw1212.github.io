<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="0; url=/weather/" />
<title>Redirecting to BJKW Weather</title>
<link rel="canonical" href="/weather/" />
<script>
  const target = "/weather/" + window.location.search + window.location.hash;
  window.location.replace(target);
</script>
</head>
<body>
<p>Redirecting to <a href="/weather/">/weather/</a>.</p>
</body>
</html>
