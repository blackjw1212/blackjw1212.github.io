<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BJKW 控制台</title>
<meta name="description" content="BJKW 公開控制台，只保留 AI 供應鏈觀察台與天氣觀察台。" />
<link rel="icon" href="/assets/images/favicon.ico" sizes="any">
<link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png" sizes="180x180">
<link rel="manifest" href="/assets/images/site.webmanifest">
<meta name="theme-color" content="#101418">
<style>
  :root{
    --bg:#101418; --panel:#172028; --line:#2e3a43;
    --ink:#f3f7f4; --soft:#b6c0bd; --faint:#87928f; --teal:#42b8a8; --amber:#d9a64c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{min-height:100vh;background:var(--bg);color:var(--ink);font-family:"Noto Sans TC",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;line-height:1.6}
  main{max-width:920px;margin:0 auto;padding:44px 18px 56px}
  .kick{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px;color:var(--teal);margin-bottom:10px}
  h1{font-size:clamp(30px,5vw,48px);line-height:1.15;font-weight:900;letter-spacing:0}
  .lead{max-width:640px;margin-top:12px;color:var(--soft);font-size:15px}
  .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;margin-top:32px}
  .entry{display:flex;min-height:218px;flex-direction:column;justify-content:space-between;border:1px solid var(--line);border-radius:8px;background:var(--panel);padding:20px;color:var(--ink);text-decoration:none}
  .entry:hover{border-color:var(--amber);text-decoration:none}
  .entry small{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--teal);font-size:12px}
  .entry h2{font-size:24px;line-height:1.2;margin-top:8px;letter-spacing:0}
  .entry p{color:var(--soft);font-size:14px;margin-top:10px}
  .go{font-family:ui-monospace,SFMono-Regular,Consolas,monospace;color:var(--amber);font-size:13px;margin-top:22px}
  footer{margin-top:30px;border-top:1px solid var(--line);padding-top:14px;color:var(--faint);font-family:ui-monospace,SFMono-Regular,Consolas,monospace;font-size:12px}
  @media (max-width:720px){
    main{padding-top:28px}
    .grid{grid-template-columns:1fr}
    .entry{min-height:178px}
  }
</style>
</head>
<body>
<main>
  <div class="kick">BJKW PUBLIC CONSOLE</div>
  <h1>只保留正在使用的觀察台</h1>
  <p class="lead">這裡是公開入口。舊站資料已清理，只留下 AI 供應鏈觀察台與天氣觀察台。</p>
  <div class="grid" aria-label="保留入口">
    <a class="entry" href="/ai/">
      <div>
        <small>AI SUPPLY CHAIN</small>
        <h2>AI 供應鏈觀察台</h2>
        <p>看台股 AI 供應鏈、加權與櫃買、10Y、收盤資料、系統觀察價與完整 TradingView 圖表。</p>
      </div>
      <span class="go">OPEN /ai/</span>
    </a>
    <a class="entry" href="/weather/">
      <div>
        <small>WEATHER</small>
        <h2>BJKW 天氣觀察台</h2>
        <p>保留天氣、潮汐、海象與相關安全資訊，透過 Worker proxy 讀取資料。</p>
      </div>
      <span class="go">OPEN /weather/</span>
    </a>
  </div>
  <footer>Observation only. Retained routes: /ai/ and /weather/.</footer>
</main>
</body>
</html>
